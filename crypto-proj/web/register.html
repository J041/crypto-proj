<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register • ACrypt</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔐</div>
        <h1>ACrypt</h1>
        <p>Secure encrypted file sharing</p>
      </div>

      <div class="field">
        <label>API Server URL</label>
        <input id="serverUrl" value="http://127.0.0.1:5000" />
      </div>
      <button id="saveServer" type="button" class="secondary btn-sm" style="margin-bottom:20px">Save Server URL</button>

      <hr class="divider" />

      <h2 style="margin-bottom:4px">Create account</h2>
      <p>Keys are generated locally. Your public key is registered with the server.</p>

      <div class="field">
        <label>Username</label>
        <input id="regUser" placeholder="alice" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button id="registerBtn" type="button" style="width:100%;margin-top:4px">Create Account →</button>
      <div class="muted" id="status" style="margin-top:12px;text-align:center"></div>

      <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </div>
  <pre id="logBox" style="display:none"></pre>

  <script src="/common.js" defer></script>
  <script src="/auth.js" defer></script>
  <script defer>
    window.addEventListener("DOMContentLoaded", () => {
      initServerUrlUI();
      document.getElementById("registerBtn").addEventListener("click", async () => {
        try {
          setStatus("status", "Generating keys & registering…");
          await registerFlow();
          setStatus("status", "✅ Registered! You can now sign in.");
        } catch (e) {
          log(`Register error: ${e.message}`);
          setStatus("status", `❌ ${e.message}`);
        }
      });
    });
  </script>
</body>
</html>
