<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login • ACrypt</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔐</div>
        <h1>ACrypt</h1>
        <p>Secure encrypted file sharing</p>
      </div>

      <div class="field">
        <label>API Server URL</label>
        <input id="serverUrl" value="http://127.0.0.1:5000" />
      </div>
      <button id="saveServer" type="button" class="secondary btn-sm" style="margin-bottom:20px">Save Server URL</button>

      <hr class="divider" />

      <h2 style="margin-bottom:16px">Sign in</h2>

      <div class="field">
        <label>Username</label>
        <input id="logUser" placeholder="alice" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="logPass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button id="loginBtn" type="button" style="width:100%;margin-top:4px">Sign In →</button>
      <div class="muted" id="status" style="margin-top:12px;text-align:center"></div>

      <div class="auth-footer">Don't have an account? <a href="/register">Register</a></div>

      <!-- Key import section — for restoring access on a new browser/device -->
      <hr class="divider" style="margin-top:28px" />
      <p style="font-size:13px;color:#6B7A99;margin:4px 0 10px">
        <strong>New browser or device?</strong> Import your key backup to restore access.
      </p>
      <label for="keyImportFile" style="
        display:inline-block;cursor:pointer;padding:6px 14px;
        border:1px solid var(--border,#D0D8E8);border-radius:6px;font-size:13px;
        color:#6B7A99;background:var(--surface,#fff);
      ">Import key backup (.json)</label>
      <input id="keyImportFile" type="file" accept=".json" style="display:none" />
      <div id="importStatus" style="margin-top:8px;font-size:13px;color:#6B7A99;"></div>
    </div>
  </div>
  <pre id="logBox" style="display:none"></pre>

  <script src="/common.js" defer></script>
  <script src="/auth.js" defer></script>
  <script defer>
    window.addEventListener("DOMContentLoaded", () => {
      initServerUrlUI();
      if (getToken() && getUsername()) { location.href = "/dashboard"; return; }

      document.getElementById("loginBtn").addEventListener("click", async () => {
        try {
          setStatus("status", "Signing in…");
          await loginFlow();
          setStatus("status", "Successful, redirecting…");
          location.href = "/dashboard";
        } catch (e) {
          log(`Login error: ${e.message}`);
          setStatus("status", e.message);
        }
      });

      document.getElementById("logPass").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
      });

      // Key import — restore localStorage keys from a backup file,
      // then auto-fill the username field so the user just needs their password
      document.getElementById("keyImportFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const username = importKeyBundle(text);
          document.getElementById("logUser").value = username;
          document.getElementById("logPass").focus();
          document.getElementById("importStatus").textContent =
            `Keys restored for "${username}". Enter your password and sign in.`;
        } catch (err) {
          document.getElementById("importStatus").textContent = err.message;
        }
        e.target.value = "";
      });
    });
  </script>
</body>
</html>
